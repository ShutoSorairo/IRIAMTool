<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>パネル開け</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="PanelReveal.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/psd.js/3.2.0/psd.min.js"></script>
</head>
<body>
    <a href="index.html" class="home-btn">ホームへ</a>

    <div class="main-container">
        <h1>パネル開け</h1>

        <!-- グローバル設定 -->
        <div class="global-settings">
            <div class="setting-group">
                <label for="psd-upload" class="upload-btn">📁 PSD読み込み</label>
                <input type="file" id="psd-upload" accept=".psd" style="display:none;">
            </div>
            <div class="setting-group">
                <label for="img-upload" class="upload-btn">🖼️ 画像読み込み</label>
                <input type="file" id="img-upload" accept="image/*" style="display:none;">
            </div>
            <div class="setting-group">
                <button onclick="toggleEditMode()" class="btn-edit" id="btn-edit-toggle">✏️ 描画モード</button>
            </div>
            <div class="setting-group">
                <button onclick="toggleControlPopup()" class="btn-open-list">📋 パネル操作</button>
            </div>
            <div class="setting-group">
                <button onclick="copyBoardImage()" class="btn-tweet">📸 画像コピー</button>
            </div>
            <div class="control-group">
                <button id="saveBtn" onclick="savePanelState()">💾 保存</button>
                <button onclick="openCloudSaveModal()" class="btn-cloud">☁️ クラウド保存</button>
                <button onclick="openCloudLoadModal()" class="btn-cloud">📂 クラウド読込</button>
                <button onclick="resetAll()" class="btn-reset">🔄 リセット</button>
                <button onclick="loadSamplePanels()" class="btn-road">🧪 サンプル</button>
                <div id="lastSavedTime" style="font-size:12px; color:#666; margin-top:5px;">保存データはありません</div>
            </div>
            <div id="saveMessage" style="display:none; position:fixed; bottom:20px; right:20px; background:#4CAF50; color:white; padding:10px 20px; border-radius:5px; z-index:1000; box-shadow:0 2px 5px rgba(0,0,0,0.2);">保存しました！</div>
        </div>

        <!-- 描画ツールバー -->
        <div id="draw-toolbar" class="draw-toolbar" style="display:none;">
            <div class="tb-group">
                <button onclick="setDrawMode('draw')" id="btn-mode-draw" class="mode-btn active">✏️ 描画</button>
                <button onclick="setDrawMode('select')" id="btn-mode-select" class="mode-btn">↖ 選択</button>
            </div>
            <div class="tb-sep"></div>
            <div class="tb-group">
                <button onclick="setShape('rect')"     class="shape-btn active" id="sh-rect"     title="四角">□ 四角</button>
                <button onclick="setShape('roundrect')" class="shape-btn" id="sh-roundrect" title="角丸">▢ 角丸</button>
                <button onclick="setShape('circle')"   class="shape-btn" id="sh-circle"   title="円">○ 円</button>
                <button onclick="setShape('diamond')"  class="shape-btn" id="sh-diamond"  title="ひし形">◇ ひし形</button>
                <button onclick="setShape('hexagon')"  class="shape-btn" id="sh-hexagon"  title="六角">⬡ 六角</button>
                <button onclick="setShape('star')"     class="shape-btn" id="sh-star"     title="星">★ 星</button>
                <button onclick="setShape('triangle')" class="shape-btn" id="sh-triangle" title="三角">△ 三角</button>
                <button onclick="setShape('heart')"    class="shape-btn" id="sh-heart"    title="ハート">♥ ハート</button>
            </div>
            <div class="tb-sep"></div>
            <label class="tb-label">色 <input type="color" id="panel-color-pick" value="#93c5fd" onchange="panelColor=this.value;"></label>
            <div class="tb-sep"></div>
            <button onclick="deleteSelectedPanel()" class="btn-red" style="font-size:0.85em; padding:5px 12px;">🗑 削除</button>
        </div>

        <!-- 選択中パネル編集 -->
        <div id="panel-editor" class="panel-editor" style="display:none;">
            <span style="font-weight:bold; font-size:0.9em; margin-right:10px;">選択中パネル編集</span>
            <label class="tb-label">ギフト名 <input type="text" id="edit-name" oninput="updatePanelProp('name',this.value)" style="width:120px;"></label>
            <label class="tb-label">PT <input type="number" id="edit-pt" oninput="updatePanelProp('giftValue',parseInt(this.value)||0)" style="width:70px;"></label>
            <label class="tb-label">ノルマ <input type="number" id="edit-target" min="1" oninput="updatePanelProp('currentTarget',parseInt(this.value)||1)" style="width:60px;"></label>
            <label class="tb-label">色 <input type="color" id="edit-color" onchange="updatePanelProp('color',this.value);"></label>
        </div>

        <!-- ボードエリア -->
        <div class="workspace">
            <div class="board-area">
                <div id="capture-target" class="board-wrapper">
                    <img id="hidden-image" src="" alt="">
                    <div id="no-image-text">PSDファイルを読み込むか、描画モードでパネルを配置してください</div>
                    <svg id="panel-svg" class="panel-layer" xmlns="http://www.w3.org/2000/svg"></svg>
                </div>
            </div>
        </div>
    </div>

    <!-- パネル操作ポップアップ -->
    <div id="control-popup" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>パネル操作・カウンター</h3>
                <button onclick="toggleControlPopup()" class="btn-close">&times;</button>
            </div>
            <div id="control-list" class="control-list"></div>
        </div>
    </div>

    <!-- クラウド保存モーダル -->
    <div id="cloud-save-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width:400px;">
            <div class="modal-header">
                <h3>☁️ クラウドに保存</h3>
                <button onclick="document.getElementById('cloud-save-modal').style.display='none'" class="btn-close">&times;</button>
            </div>
            <div style="padding:16px;">
                <label style="display:block; margin-bottom:6px; font-size:0.9em;">保存名</label>
                <input type="text" id="cloud-save-name" placeholder="例: 配信用パネルA" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:6px; box-sizing:border-box; font-size:1em;">
                <button onclick="cloudSavePanel()" style="margin-top:12px; width:100%; padding:10px; background:#4f8cff; color:#fff; border:none; border-radius:8px; font-size:1em; cursor:pointer;">保存する</button>
                <p id="cloud-save-msg" style="text-align:center; font-size:0.9em; margin-top:8px; min-height:20px;"></p>
            </div>
        </div>
    </div>

    <!-- クラウド読込モーダル -->
    <div id="cloud-load-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width:400px;">
            <div class="modal-header">
                <h3>📂 クラウドから読込</h3>
                <button onclick="document.getElementById('cloud-load-modal').style.display='none'" class="btn-close">&times;</button>
            </div>
            <div style="padding:16px;">
                <div id="cloud-load-list" style="max-height:300px; overflow-y:auto;"></div>
                <p id="cloud-load-msg" style="text-align:center; color:#aaa; font-size:0.9em; margin-top:8px;"></p>
            </div>
        </div>
    </div>

    <script src="PanelReveal.js"></script>
    <script type="module" src="PanelReveal-autosave.js"></script>
    <script type="module" src="PanelReveal-firebase.js"></script>
    <script src="userbar.js"></script>
</body>
</html>
