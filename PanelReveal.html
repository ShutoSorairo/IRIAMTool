<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>パネル開け</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="PanelReveal.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/psd.js/3.2.0/psd.min.js"></script>
    <script src="PanelReveal.js"></script>
</head>
<body>
    <a href="index.html" class="home-btn">ホームへ戻る</a>

    <div class="main-container">
        <h1>パネル開け</h1>
        
        <div class="global-settings">
            <div class="setting-group">
                <label for="psd-upload" class="upload-btn">📁 PSD読み込み</label>
                <input type="file" id="psd-upload" accept=".psd" style="display:none;">
            </div>
            <div class="setting-group">
                <button onclick="toggleControlPopup()" class="btn-open-list">📋 パネル操作・カウンター</button>
            </div>
            <div class="setting-group">
                <button onclick="copyBoardImage()" class="btn-tweet">📸 画像コピー</button>
            </div>
            <div class="setting-group">
                <button id="reset-panels" class="btn-reset">🔄 リセット</button>
            </div>
        </div>
        
        <div class="workspace">
            <div class="board-area">
                <div id="capture-target" class="board-wrapper">
                    <img id="hidden-image" src="" alt="">
                    <div id="no-image-text">PSDファイルを読み込んでください</div>
                    <svg id="panel-svg" class="panel-layer" xmlns="http://www.w3.org/2000/svg"></svg>
                </div>
            </div>
        </div>
    </div>

    <div id="control-popup" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>パネル操作・カウンター</h3>
                <button onclick="toggleControlPopup()" class="btn-close">&times;</button>
            </div>
            <div id="control-list" class="control-list">
                </div>
        </div>
    </div>
</body>
</html>
