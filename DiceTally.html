<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>味見ダイス</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="DiceTally.css">
</head>
<body>
    <a href="index.html" class="home-btn">ホームへ</a>
    <div class="dt-wrap">
        <div class="dt-header">
            <p class="dt-label">🎲 ギフト集計</p>
            <h1 class="dt-title">味見ダイス</h1>
        </div>

        <button class="dt-btn-new" onclick="openCreateModal()">
            <span style="font-size:1.2em;">＋</span> 新しい企画を作成
        </button>

        <div class="dt-section-label">過去の企画</div>
        <div id="sessionList"><div class="dt-loading">読み込み中...</div></div>
    </div>

    <!-- 新規作成モーダル -->
    <div class="dt-modal-overlay" id="createModal" onclick="closeCreateModal(event)">
        <div class="dt-modal">
            <div class="dt-modal-header">
                <h3>新しい企画を作成</h3>
                <button class="dt-modal-close" onclick="closeCreateModal()">×</button>
            </div>
            <div class="dt-modal-body">
                <input type="text" id="newSessionName" class="dt-input" placeholder="例: 6月19日の配信">
                <button class="dt-btn-save" style="width:100%; margin-top:10px;" onclick="createSession()">作成して開く</button>
            </div>
        </div>
    </div>

    <script type="module" src="DiceTally.js"></script>
    <script src="userbar.js"></script>
</body>
</html>
