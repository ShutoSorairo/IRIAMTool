<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ギフト割り当てツール</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        .card { max-width: 600px; margin: 60px auto; background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #4f8cff; font-size: 1.4rem; margin-bottom: 16px; }
        .run-btn { width: 100%; padding: 14px; background: #e65100; color: #fff; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        .run-btn:disabled { background: #aaa; cursor: not-allowed; }
        #log { margin-top: 20px; background: #1e1e1e; color: #00e676; font-family: monospace; font-size: 0.85em; padding: 16px; border-radius: 8px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>
    <a href="index.html" class="home-btn">ホームへ</a>
    <div class="card">
        <h1>専用ギフト割り当てツール</h1>
        <p>対象UID: <b>7c10cdb2-a94c-45b3-b9de-e16d4881158a</b>（しのん）</p>
        <button class="run-btn" id="run-btn" onclick="run()">割り当てを実行する</button>
        <div id="log"></div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, getDocs, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";

        const TARGET_UID = '7c10cdb2-a94c-45b3-b9de-e16d4881158a';
        const log = document.getElementById('log');
        function addLog(msg) {
            log.style.display = 'block';
            log.textContent += msg + '\n';
            log.scrollTop = log.scrollHeight;
        }

        window.run = async function() {
            if (!sessionStorage.getItem('iriam_admin_logged_in')) {
                alert('管理者ログインが必要です');
                return;
            }
            const btn = document.getElementById('run-btn');
            btn.disabled = true;
            btn.textContent = '実行中...';

            // ユーザードキュメント作成（なければ）
            await setDoc(doc(db, 'users', TARGET_UID), {
                displayName: 'しのん',
                createdAt: serverTimestamp()
            }, { merge: true });
            addLog('ユーザードキュメント確認OK');

            // gifts.json読み込み
            const res = await fetch('./gifts.json');
            const gifts = await res.json();
            const senyo = gifts.filter(g => {
                const cats = Array.isArray(g.category) ? g.category : Array.isArray(g.categories) ? g.categories : [g.category];
                return cats.includes('専用');
            });
            addLog(`専用ギフト: ${senyo.length}件`);

            // 既存チェック
            const existing = await getDocs(collection(db, 'users', TARGET_UID, 'gifts'));
            if (!existing.empty) {
                const ok = confirm(`すでに${existing.size}件の専用ギフトがあります。追加しますか？`);
                if (!ok) { btn.disabled = false; btn.textContent = '割り当てを実行する'; return; }
            }

            let count = 0;
            for (const g of senyo) {
                const cats = Array.isArray(g.category) ? g.category : Array.isArray(g.categories) ? g.categories : [g.category];
                await addDoc(collection(db, 'users', TARGET_UID, 'gifts'), {
                    name: g.name, categories: cats, src: g.src, createdAt: serverTimestamp()
                });
                addLog(`追加: ${g.name}`);
                count++;
            }

            addLog(`\n===== 完了: ${count}件 =====`);
            btn.textContent = '完了';
        };
    </script>
</body>
</html>
