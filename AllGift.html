<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>全ギフト</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="AllGift.css">
</head>
<body>
    <h1>IRIAM 全ギフト一覧</h1>
    <div class="tab-container" id="tabContainer"></div>
    <div style="text-align:right; margin-bottom:6px;">
        <select id="sort-select" onchange="setSort(this.value)" style="padding:6px 12px; border:1px solid #ddd; border-radius:6px; font-size:0.9em; cursor:pointer;">
            <option value="pt_asc">PT順 (低→高)</option>
            <option value="pt_desc">PT順 (高→低)</option>
            <option value="add_asc">追加順 (古→新)</option>
            <option value="add_desc">追加順 (新→古)</option>
        </select>
    </div>
    <div class="gift-grid" id="giftList"></div>
    <a href="index.html" class="home-btn">ホームへ</a>
    <script type="module" src="AllGift.js"></script>
</body>
</html>
