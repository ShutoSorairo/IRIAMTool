<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>IRIAMツール</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <style>
        .user-bar { position: absolute; top: 24px; right: 24px; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: #555; }
        .logout-btn { background: #f5f5f5; border: 1px solid #ddd; border-radius: 7px; padding: 6px 14px; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; }
        .logout-btn:hover { background: #ffe0e0; border-color: #e53935; color: #e53935; }
        .login-link { color: #4f8cff; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="user-bar" id="user-bar">
        <span id="user-name"></span>
        <button class="logout-btn" id="logout-btn" style="display:none" onclick="doLogout()">ログアウト</button>
        <a href="Login.html" class="login-link" id="login-link" style="display:none">ログイン / 登録</a>
    </div>
    <div class="main-container">
        <h1>IRIAMツール メインページ</h1>
        <p class="description">このページはIRIAMツールのメインページです。</p>
        <nav>
            <ul class="menu-list">
                <li>
                    <a href="Roulette.html" class="menu-btn">ルーレット</a>
                </li>
                <li>
                    <a href="Rock-paper-scissors.html" class="menu-btn">じゃんけん</a>
                </li>
                <li>
                    <a href="Gacha.html" class="menu-btn">ガチャ</a>
                </li>
                 <li>
                    <a href="AllGift.html" class="menu-btn">全ギフト</a>
                </li>
                <li>
                    <a href="PanelReveal.html" class="menu-btn">パネル開け</a>
                </li>
                <li>
                    <a href="https://www.iriam.app/top" target="_blank" class="menu-btn">お得チャージ</a>
                </li>
                <li>
                    <a href="https://www.iriam.app/diamond" target="_blank" class="menu-btn">ダイヤ換金</a>
                </li>
                <li>
                    <a href="MusicReport.html" class="menu-btn">使用楽曲の報告</a>
                </li>
            </ul>
        </nav>
        <footer style="margin-top:32px; text-align:center; color:#888; font-size:0.95em;">
            作成者: 空天色しゅーと<br>
            バージョン: 1.6.0
        </footer>
                    <br><br>
            <a href="AdminLogin.html" style="font-size:0.8em; color:#ccc; text-decoration:none;">[管理者ページ]</a>
        </footer>
    </div>
    <script>
        const uid = localStorage.getItem('iriam_uid');
        const name = localStorage.getItem('iriam_name');
        if (uid && name) {
            document.getElementById('user-name').textContent = name + ' さん';
            document.getElementById('logout-btn').style.display = '';
            document.getElementById('login-link').style.display = 'none';
        } else {
            document.getElementById('user-name').textContent = '';
            document.getElementById('logout-btn').style.display = 'none';
            document.getElementById('login-link').style.display = '';
        }

        window.doLogout = function() {
            localStorage.removeItem('iriam_uid');
            localStorage.removeItem('iriam_name');
            location.reload();
        };
    </script>
</body>
</html>
